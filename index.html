<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare App</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <style>
        nav a:hover {
    color: #ffcc00;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
    transition: 0.3s;
}
    </style>
    <!-- Navbar -->
    <nav class="navbar">
        <h1 class="logo">HealthCare</h1>
        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>
            <li><a href="product.html">Products</a></li>
            <li><a href="doctor.html">Doctors</a></li>
            <li><a href="Login.html">Login</a></li>
        </ul>
        <input type="text" placeholder="Search products...">
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Your Health, Our Priority</h2>
        <p>Buy medicines and book doctor appointments easily</p>
        <button>Explore Now</button>
    </section>

    <!-- Categories -->
    <section class="categories">
        <h2>Our Services</h2>
        <div class="category-container">
            <div class="card">Medicines</div>
            <div class="card">Supplements</div>
            <div class="card">Doctor Booking</div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Healthcare App. All rights reserved.</p>
    </footer>

    <script>
        document.querySelector(".explore-btn").onclick = () => {
    window.location.href = "products.html";
};

document.getElementById("medicines").onclick = () => {
    window.location.href = "products.html";
};

document.getElementById("doctor").onclick = () => {
    window.location.href = "doctors.html";
};
    </script>

</body>
</html>
